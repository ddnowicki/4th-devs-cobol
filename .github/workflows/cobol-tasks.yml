          HUB_API_KEY: ${{ secrets.HUB_API_KEY }}
          HUB_API_URL: ${{ secrets.HUB_API_URL }}
          SERVER_URL: ${{ secrets.SERVER_URL }}
        run: |
          PAYLOAD="{\"apikey\":\"${HUB_API_KEY}\",\"task\":\"negotiations\",\"answer\":{\"tools\":[{\"URL\":\"${SERVER_URL}/api/search\",\"description\":\"Search for an item by name (in Polish). POST {\\\"params\\\":\\\"query\\\"}. Returns cities where available. If item name is censored or replaced with CENZURA, include any context (specs, type, voltage) and the tool will find it.\"},{\"URL\":\"${SERVER_URL}/api/report\",\"description\":\"Call after all searches with {\\\"params\\\":\\\"city1,city2\\\"} to verify final answer. Returns confirmation.\"}]}}"
          echo "Submitting verification request..."
          RESPONSE=$(curl -s -X POST "${HUB_API_URL}/verify" -H "Content-Type: application/json" -d "$PAYLOAD")
          echo "$RESPONSE" | sed 's/{FLG:[^}]*}/{FLG:XXX}/g'

      - name: Wait for hub to test server
        run: sleep 60

      - name: Check server logs
        run: |
          ssh azyl "cat ~/s03e04-deploy/server.log 2>/dev/null" | sed 's/{FLG:[^}]*}/{FLG:XXX}/g'

      - name: Check verification result
        env:
          HUB_API_KEY: ${{ secrets.HUB_API_KEY }}
          HUB_API_URL: ${{ secrets.HUB_API_URL }}
        run: |
          set +e
          OUTPUT=$(curl -s -X POST "${HUB_API_URL}/verify" -H "Content-Type: application/json" -d "{\"apikey\":\"${HUB_API_KEY}\",\"task\":\"negotiations\",\"answer\":{\"action\":\"check\"}}")
