        run: |
          ssh azyl "export PATH=~/local/usr/bin:\$PATH && export LD_LIBRARY_PATH=~/local/usr/lib/x86_64-linux-gnu:\$LD_LIBRARY_PATH && export COB_CONFIG_DIR=~/local/etc/gnucobol && export CPATH=~/local/usr/include/x86_64-linux-gnu:~/local/usr/include:\$CPATH && export LIBRARY_PATH=~/local/usr/lib/x86_64-linux-gnu:\$LIBRARY_PATH && cd ~/s03e04-deploy && cobc -x -I copybooks/ -o app app.cob"

      - name: Start server
        run: |
          ssh azyl "cd ~/s03e04-deploy && export PATH=~/local/usr/bin:\$PATH && export LD_LIBRARY_PATH=~/local/usr/lib/x86_64-linux-gnu:\$LD_LIBRARY_PATH && export COB_CONFIG_DIR=~/local/etc/gnucobol && export HUB_API_KEY='${{ secrets.HUB_API_KEY }}' && export HUB_API_URL='${{ secrets.HUB_API_URL }}' && export OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' && export OPENAI_API_URL='${{ secrets.OPENAI_API_URL }}' && export SERVER_URL='${{ secrets.SERVER_URL }}' && export PORT='${{ secrets.AZYL_APP_PORT }}' && rm -f server.log && nohup ./app > server.log 2>&1 &"
          sleep 5

      - name: Verify server is running
