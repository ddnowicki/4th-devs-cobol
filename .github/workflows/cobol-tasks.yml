name: COBOL Tasks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  s01e01:
    name: S01E01 - People
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol4

      - name: Mask sensitive values
        run: |
          echo "::add-mask::${{ secrets.HUB_API_URL }}"
          echo "::add-mask::${{ secrets.OPENAI_API_URL }}"
          echo "::add-mask::${{ secrets.AZYL_HOST }}"

      - name: Compile
        working-directory: S01E01
        run: cobc -x -o app app.cob

      - name: Run
        working-directory: S01E01
        env:
          HUB_API_KEY: ${{ secrets.HUB_API_KEY }}
          HUB_API_URL: ${{ secrets.HUB_API_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_URL: ${{ secrets.OPENAI_API_URL }}
        run: |
          set +e
          OUTPUT=$(./app 2>&1)
          MASKED=$(echo "$OUTPUT" | sed 's/{FLG:[^}]*}/{FLG:XXX}/g')
          echo "$MASKED"
          if echo "$OUTPUT" | grep -q 'FLG:'; then
            echo ""
            echo "Task completed - flag found"
            exit 0
          else
            echo ""
            echo "::error::Flag not found in output"
            exit 1
          fi

  s01e02:
